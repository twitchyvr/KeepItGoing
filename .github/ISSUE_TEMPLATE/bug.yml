name: Bug Report
description: Report a bug or unexpected behavior
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Fill out the sections below so we can reproduce and fix this.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Tell us what you saw...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots.

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (app crashes, data loss)
        - High (feature broken, no workaround)
        - Medium (feature broken, workaround exists)
        - Low (cosmetic, minor annoyance)
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      description: "e.g., iOS 18.2, Chrome 128, macOS 15.4"
    validations:
      required: true
